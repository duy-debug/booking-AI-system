services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build: ./booking-ai-system-be
    ports:
      - "8000:8000"
    env_file: ./booking-ai-system-be/.env
    restart: unless-stopped

  chatbot:
    build: ./booking-ai-chatbot
    ports:
      - "8001:8000"
    env_file: ./booking-ai-chatbot/.env
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./booking-ai-system-fe
      args:
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
